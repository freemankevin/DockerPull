services:
  app:
    image: ${IMAGE:-ghcr.io/freemankevin/dockpull:latest}
    build:
      context: .
    ports:
      - "${PORT:-9238}:9238"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${DATA_DIR:-./data}:/app/data
      - ${EXPORTS_DIR:-./exports}:/app/exports
    environment:
      - DOCKER_HOST=unix:///var/run/docker.sock
      - SERVER_HOST=0.0.0.0
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9238/api/stats"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s