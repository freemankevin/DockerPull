<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DockPull — Sign In</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --text-h1: 28px;
    --text-h2: 20px;
    --text-h3: 16px;
    --text-h4: 14px;
    --text-h5: 12px;
  }

  body {
    min-height: 100vh;
    font-family: 'DM Sans', sans-serif;
    background: #0d0a1a;
    display: flex;
  }

  .text-h1 { font-size: var(--text-h1); }
  .text-h2 { font-size: var(--text-h2); }
  .text-h3 { font-size: var(--text-h3); }
  .text-h4 { font-size: var(--text-h4); }
  .text-h5 { font-size: var(--text-h5); }

  .font-light    { font-weight: 300; }
  .font-normal   { font-weight: 400; }
  .font-medium   { font-weight: 500; }
  .font-semibold { font-weight: 600; }
  .font-bold     { font-weight: 700; }

  /* ── Left panel ── */
  .left {
    flex: 1;
    position: relative;
    overflow: hidden;
    min-height: 100vh;
  }

  .bg-photo {
    position: absolute; inset: 0;
    background:
      url('https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=1400&q=80')
      center/cover no-repeat;
  }

  /* multi-layer overlay: dark at bottom, purple tint, right-side fade to match panel */
  .bg-overlay {
    position: absolute; inset: 0;
    background:
      linear-gradient(to right, transparent 60%, #12102a 100%),
      linear-gradient(to top, rgba(5,3,15,0.75) 0%, rgba(60,40,90,0.25) 60%, transparent 100%);
  }

  .left-content {
    position: relative;
    z-index: 2;
    padding: 64px 56px;
    height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }

  .brand { margin-bottom: auto; }

  .brand-name {
    font-family: 'Dancing Script', cursive;
    font-size: 64px;
    color: #fff;
    letter-spacing: -1px;
    line-height: 1;
    text-shadow: 0 2px 24px rgba(120, 80, 200, 0.5);
  }

  .brand-tagline {
    margin-top: 16px;
    font-size: 15px;
    font-weight: 300;
    color: rgba(255,255,255,0.6);
    max-width: 480px;
    line-height: 1.6;
    letter-spacing: 0.02em;
  }

  .left-footer {
    font-size: 13px;
    color: rgba(255,255,255,0.3);
    letter-spacing: 0.04em;
  }

  /* subtle floating dots decoration */
  .dots {
    position: absolute;
    bottom: 120px; right: 80px;
    display: grid;
    grid-template-columns: repeat(5, 8px);
    gap: 10px;
    opacity: 0.18;
    z-index: 2;
  }
  .dots span {
    width: 3px; height: 3px;
    border-radius: 50%;
    background: #c4a8ff;
  }

  /* ── Right panel ── */
  .right {
    width: 420px;
    flex-shrink: 0;
    background: #12102a;
    border-left: 1px solid rgba(140, 100, 220, 0.15);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 48px 40px;
    position: relative;
  }

  /* subtle purple glow at top of right panel */
  .right::before {
    content: '';
    position: absolute;
    top: -80px; left: 50%;
    transform: translateX(-50%);
    width: 260px; height: 260px;
    background: radial-gradient(circle, rgba(120, 80, 220, 0.18) 0%, transparent 70%);
    pointer-events: none;
  }

  .form-wrapper {
    width: 100%;
    position: relative;
    z-index: 1;
  }

  .form-heading {
    color: #f0eaff;
    letter-spacing: -0.4px;
    margin-bottom: 8px;
    margin-top: 50px;
  }

  .form-sub {
    color: rgba(200, 185, 230, 0.5);
    margin-bottom: 40px;
  }

  .field { margin-bottom: 20px; }

  label {
    display: block;
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: rgba(200, 185, 230, 0.55);
    margin-bottom: 8px;
  }

  .input-wrap {
    position: relative;
  }

  .input-icon {
    position: absolute;
    left: 14px; top: 50%;
    transform: translateY(-50%);
    width: 16px; height: 16px;
    opacity: 0.35;
    pointer-events: none;
  }

  input[type="text"],
  input[type="password"] {
    width: 100%;
    height: 48px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(140, 100, 220, 0.2);
    border-radius: 10px;
    color: #f0eaff;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 300;
    padding: 0 44px 0 42px;
    outline: none;
    transition: border-color 0.2s, background 0.2s;
  }

  input::placeholder { color: rgba(200, 185, 230, 0.25); }

  input:focus {
    border-color: rgba(140, 100, 220, 0.6);
    background: rgba(140, 100, 220, 0.06);
  }

  .eye-btn {
    position: absolute;
    right: 14px; top: 50%;
    transform: translateY(-50%);
    background: none; border: none; cursor: pointer;
    opacity: 0.3;
    padding: 2px;
    transition: opacity 0.15s;
  }
  .eye-btn:hover { opacity: 0.65; }

  .row-meta {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin: 6px 0 28px;
  }

  .remember {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    color: rgba(200, 185, 230, 0.45);
    font-weight: 300;
    cursor: pointer;
    user-select: none;
  }

  .remember input[type="checkbox"] {
    width: 15px; height: 15px;
    accent-color: #8b5cf6;
    padding: 0;
    border-radius: 4px;
  }

  .forgot {
    font-size: 13px;
    color: rgba(160, 120, 240, 0.7);
    font-weight: 300;
    text-decoration: none;
    transition: color 0.15s;
  }
  .forgot:hover { color: #c4a8ff; }

  .btn-signin {
    width: 100%;
    height: 50px;
    background: linear-gradient(135deg, #7c3aed 0%, #6028c4 100%);
    border: none;
    border-radius: 10px;
    color: #fff;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 500;
    letter-spacing: 0.03em;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: opacity 0.2s, transform 0.15s;
    box-shadow: 0 4px 24px rgba(120, 60, 220, 0.35);
  }

  .btn-signin::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, transparent 60%);
  }

  .btn-signin:hover { opacity: 0.9; transform: translateY(-1px); }
  .btn-signin:active { transform: translateY(0); }

  .divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 28px 0;
  }
  .divider-line {
    flex: 1;
    height: 1px;
    background: rgba(140, 100, 220, 0.12);
  }
  .divider-text {
    font-size: 12px;
    color: rgba(200, 185, 230, 0.25);
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }

  .sso-btn {
    width: 100%;
    height: 46px;
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(140, 100, 220, 0.15);
    border-radius: 10px;
    color: rgba(200, 185, 230, 0.55);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 400;
    letter-spacing: 0.02em;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center; gap: 10px;
    transition: border-color 0.2s, color 0.2s, background 0.2s;
  }
  .sso-btn:hover {
    border-color: rgba(140, 100, 220, 0.35);
    color: rgba(200, 185, 230, 0.8);
    background: rgba(140, 100, 220, 0.05);
  }

  .form-footer {
    text-align: center;
    margin-top: 28px;
    font-size: 13px;
    color: rgba(200, 185, 230, 0.3);
    font-weight: 300;
  }
  .form-footer a {
    color: rgba(160, 120, 240, 0.75);
    text-decoration: none;
    font-weight: 400;
    transition: color 0.15s;
  }
  .form-footer a:hover { color: #c4a8ff; }
</style>
</head>
<body>

<section class="left">
  <div class="bg-photo"></div>
  <div class="bg-overlay"></div>
  <div class="left-content">
    <div class="brand">
      <div class="brand-name">DockPull</div>
      <p class="brand-tagline">A lightweight Docker image management system for pulling and organizing container images with ease</p>
    </div>
    <div class="left-footer">© 2026 DockPull — v2.4.1</div>
  </div>
  <div class="dots">
    <span></span><span></span><span></span><span></span><span></span>
    <span></span><span></span><span></span><span></span><span></span>
    <span></span><span></span><span></span><span></span><span></span>
    <span></span><span></span><span></span><span></span><span></span>
    <span></span><span></span><span></span><span></span><span></span>
  </div>
</section>

<section class="right">
  <div class="form-wrapper">
    <h1 class="form-heading text-h1 font-medium">Sign In</h1>
    <p class="form-sub text-h4 font-light">Enter your credentials to access the system</p>

    <div class="field">
      <label for="username">Username</label>
      <div class="input-wrap">
        <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
          <circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
        </svg>
        <input type="text" id="username" placeholder="Enter your username" autocomplete="username">
      </div>
    </div>

    <div class="field">
      <label for="password">Password</label>
      <div class="input-wrap">
        <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
          <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
        <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password">
        <button class="eye-btn" onclick="togglePwd()" aria-label="Toggle password visibility">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
      </div>
    </div>

    <div class="row-meta">
      <label class="remember">
        <input type="checkbox"> Remember me
      </label>
      <a href="#" class="forgot">Forgot password?</a>
    </div>

    <button class="btn-signin">Sign In</button>

    <div class="divider">
      <div class="divider-line"></div>
      <span class="divider-text">or</span>
      <div class="divider-line"></div>
    </div>

    <button class="sso-btn">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/>
        <rect x="14" y="14" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/>
      </svg>
      Continue with SSO
    </button>

    <p class="form-footer">
      New to DockPull? <a href="#">Request access</a>
    </p>
  </div>
</section>

<script>
  function togglePwd() {
    const p = document.getElementById('password');
    p.type = p.type === 'password' ? 'text' : 'password';
  }
</script>
</body>
</html>
